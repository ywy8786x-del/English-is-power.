            margin: 0;

            overflow-x: hidden;
        }

            content: "";
            position: fixed;
            top: 50%; left: 50%;
            width: 200%; height: 200%;
            background: repeating-radial-gradient(rgba(16, 185, 129, 0.05) 0%, transparent 10%);
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 30px 15px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        header p { font-size: 0.9rem; margin-top: 0; }

        .menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--gold);
            color: var(--dark-green);
            width: 45px; height: 45px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1000;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .side-menu {
            position: fixed;
            top: 0; right: -300px;
            width: 280px; height: 100%;
            background: rgba(2, 44, 34, 0.98);
            backdrop-filter: blur(15px);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 999;
            padding-top: 80px;
        }

        .side-menu a {
            display: block; padding: 15px 25px;
            color: white; text-decoration: none;
            border-bottom: 1px solid var(--glass);
            transition: 0.3s;
            font-size: 1.1rem;
        }

        .side-menu a:hover { background: var(--neon-green); padding-right: 35px; }

        .search-box {
            max-width: 600px;
            margin: 20px auto;
            position: relative;
            padding: 0 15px;
        }

        #searchInput {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid var(--neon-green);
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        #searchInput:focus { box-shadow: 0 0 15px var(--neon-green); }

        .words-container {
            max-width: 800px;
            margin: auto;
            padding: 10px 15px 80px 15px;
        }

        .word-card {
            background: var(--glass);
            border-left: 4px solid var(--gold);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .word-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.15); }

        .audio-controls { display: flex; gap: 8px; }

        .btn-audio {
            background: var(--neon-green);
            border: none; color: white;
            width: 38px; height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-audio.slow { background: var(--gold); color: black; }

        .btn-delete {
            background: #ff4d4d;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 5px;
            margin-left: 10px;

        }

        .admin-modal {

        .admin-modal input {

            border-radius: 8px; box-sizing: border-box;

        .overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;

                    ar: ar,
                    timestamp: Date.now()
                }).then(() => {
                    document.getElementById('newEn').value = '';
                    document.getElementById('newAr').value = '';
                    document.getElementById('newEn').focus();
                });
            }

        function handleWordNav(e, nextId) {
            if(e.key === 'Enter') {
                e.preventDefault();
                if(nextId === 'addBtn') {

                } else {

                }
            }

            if(confirm("هل أنت متأكد من حذف هذه الكلمة نهائياً؟")) {
                db.ref('words/' + id).remove();

        function filterWords() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = dictionary.filter(i => i.en.toLowerCase().includes(q) || i.ar.includes(q));
            displayWords(filtered);
        }

        function speak(text, rate) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            const britishVoice = voices.find(v => v.lang === 'en-GB' || v.name.includes('United Kingdom'));
            if (britishVoice) msg.voice = britishVoice;
            msg.lang = 'en-GB';
            msg.rate = rate;
            msg.pitch = 1;
            window.speechSynthesis.speak(msg);
        }

            }
        });

        function showAdmin() { 
            resetAdminModal(); 
            document.getElementById('adminPanel').style.display = 'block'; 
            document.getElementById('overlay').style.display = 'block'; 
            document.getElementById('adminPass').focus(); 
        }

        function closeAdmin() { 
            document.getElementById('adminPanel').style.display = 'none'; 
            document.getElementById('overlay').style.display = 'none'; 
        }

        function resetAdminModal() { 
            document.getElementById('loginSection').style.display = 'block'; 
            document.getElementById('controlSection').style.display = 'none'; 
        }

        function loginAdmin() { 
            if(document.getElementById('adminPass').value === ADMIN_PASS) { 
                isAdmin = true; 
                document.getElementById('loginSection').style.display = 'none'; 
                document.getElementById('controlSection').style.display = 'block'; 
                setTimeout(() => document.getElementById('newEn').focus(), 100);
                displayWords(dictionary); 
            } else { 
                alert("خطأ!"); 
            } 
        }

        function handleAdminLogin(e) { if(e.key === 'Enter') loginAdmin(); }
        function accessDatabase() { if (prompt("رمز الوصول:") === ADMIN_PASS) showAdmin(); }

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
