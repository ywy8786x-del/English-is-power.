    <style>
        :root {
            --dark-green: #064e3b;
            --neon-green: #10b981;
            --gold: #fbbf24;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at center, #065f46 0%, #022c22 100%);
            color: white;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 50%; left: 50%;
            width: 200%; height: 200%;
            background: repeating-radial-gradient(rgba(16, 185, 129, 0.05) 0%, transparent 10%);
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        /* تعديل أنميشن الطائرة لتظهر مرة واحدة واللافتة ترفرف بواقعية */
        .plane-animation {
            position: fixed;
            top: 15%;
            left: -100%;
            display: flex;
            align-items: center;
            z-index: 2000;
            pointer-events: none;
            /* تم التعديل لتظهر مرة واحدة فقط 1 بدلاً من infinite */
            animation: flyRealistic 25s linear 1 forwards; 
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.7));
            perspective: 1200px;
        }

        .plane-icon {
            font-size: 80px;
            color: #ffffff;
            text-shadow: 0 0 30px var(--neon-green);
            position: relative;
            z-index: 5;
            transform: rotate(10deg);
        }

        .plane-banner {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 50%, #fbbf24 100%);
            background-size: 200% 100%;
            color: #064e3b;
            padding: 15px 40px;
            border-radius: 2px 8px 8px 2px;
            font-weight: 900;
            white-space: nowrap;
            font-size: 1.6rem;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 2px solid rgba(255,255,255,0.4);
            /* أنيميشن الرفرفة من الطرف الحر */
            animation: realisticWave 1.2s ease-in-out infinite;
            margin-left: -10px;
            transform-origin: right center; /* الرفرفة تبدأ من الطرف البعيد عن الطائرة */
        }

        @keyframes flyRealistic {
            0% { left: -50%; transform: translateY(0) rotate(5deg); }
            50% { transform: translateY(-50px) rotate(0deg); }
            100% { left: 150%; transform: translateY(0) rotate(-5deg); }
        }

        @keyframes realisticWave {
            0%, 100% { transform: rotateX(0deg) skewY(0deg) scaleX(1); }
            25% { transform: rotateX(10deg) skewY(1deg) scaleX(1.02); }
            50% { transform: rotateX(-10deg) skewY(-1deg) scaleX(0.98); }
            75% { transform: rotateX(5deg) skewY(0.5deg) scaleX(1.01); }
        }

        .custom-toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(5px);
            color: var(--dark-green);
            padding: 12px 25px;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(251, 191, 36, 0.5);
            opacity: 0;
        }
        .custom-toast.show { bottom: 40px; opacity: 1; }

        header {
            text-align: center;
            padding: 30px 15px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        header h1 { font-size: 1.8rem; margin-bottom: 5px; }
        header p { font-size: 0.9rem; margin-top: 0; }

        .menu-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--gold);
            color: var(--dark-green);
            width: 45px; height: 45px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1000;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .side-menu {
            position: fixed;
            top: 0; right: -300px;
            width: 280px; height: 100%;
            background: rgba(2, 44, 34, 0.98);
            backdrop-filter: blur(15px);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1500;
            padding-top: 80px;
        }

        .side-menu a {
            display: block; padding: 15px 25px;
            color: white; text-decoration: none;
            border-bottom: 1px solid var(--glass);
            transition: 0.3s;
            font-size: 1.1rem;
        }

        .side-menu a:hover { background: var(--neon-green); padding-right: 35px; }

        .search-box {
            max-width: 600px;
            margin: 20px auto;
            position: relative;
            padding: 0 15px;
        }

        #searchInput {
            width: 100%;
            padding: 12px 20px;
            border-radius: 50px;
            border: 2px solid var(--neon-green);
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        #searchInput:focus { box-shadow: 0 0 15px var(--neon-green); }

        .words-container {
            max-width: 800px;
            margin: auto;
            padding: 10px 15px 80px 15px;
        }

        .word-card {
            background: var(--glass);
            border-left: 4px solid var(--gold);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .word-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.15); }

        .audio-controls { display: flex; gap: 8px; }

        .btn-audio {
            background: var(--neon-green);
            border: none; color: white;
            width: 38px; height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .btn-audio.slow { background: var(--gold); color: black; }

        .btn-delete {
            background: #ff4d4d;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 5px;
            margin-left: 10px;
            cursor: pointer;
        }

        .admin-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white; color: #333;
            padding: 25px; border-radius: 20px;
            z-index: 2001; width: 85%; max-width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .admin-modal input {
            width: 100%; padding: 12px;
            margin: 8px 0; border: 1px solid #ddd;
            border-radius: 8px; box-sizing: border-box;
            font-size: 1rem;
        }

        .admin-modal button {
            width: 100%; padding: 12px;
            background: var(--dark-green); color: white;
            border: none; border-radius: 8px; cursor: pointer;
            font-size: 1rem; font-weight: bold; margin-top: 10px;
        }

        .overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000;
            backdrop-filter: blur(5px);
        }

        @media (max-width: 400px) {
            header h1 { font-size: 1.4rem; }
            .word-card { flex-direction: column; align-items: flex-start; gap: 15px; }
            .audio-controls { align-self: flex-end; }
        }
    </style>
</head>

        ];

        let dictionary = [...baseWords];
        let isAdmin = false;
        const ADMIN_PASS = "amjadalrefaay.xx";

        function speak(text, rate) {
            window.speechSynthesis.cancel();
            if (rate > 0.7) {
                const audio = new Audio(`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(text)}&tl=en&client=tw-ob`);
                audio.play().catch(() => fallbackSpeak(text, rate));
            } else {
                fallbackSpeak(text, rate);
            }
        }

        function fallbackSpeak(text, rate) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = rate;
            window.speechSynthesis.speak(msg);
        }

        function closeMenuIfOutside(event) {
            const sideMenu = document.getElementById('sideMenu');
            const menuBtn = document.getElementById('menuBtn');
            if (sideMenu.style.right === '0px') {
                if (!sideMenu.contains(event.target) && !menuBtn.contains(event.target)) {
                    sideMenu.style.right = '-300px';
                }
            }
        }

        db.ref('words').on('value', (snapshot) => {
            const data = snapshot.val();
            dictionary = [...baseWords];
            if (data) {
                Object.keys(data).forEach(key => {
                    dictionary.push({ id: key, ...data[key] });
                });
            }
            displayWords(dictionary);
        });

        function displayWords(data) {
            const list = document.getElementById('wordsList');
            const counter = document.getElementById('wordsCounter');
            counter.innerHTML = `<i class="fas fa-list-ol"></i> إجمالي المحتوى: ${data.length} كلمة وجملة`;
            
            let content = '';
            data.forEach((item) => {
                content += `
                    <div class="word-card">
                        <div style="display:flex; align-items:center;">
                            ${isAdmin ? `<button class="btn-delete" onclick="deleteWord('${item.id}', '${item.en}')"><i class="fas fa-trash"></i></button>` : ''}
                            <div>
                                <div style="color:var(--gold); font-weight:bold; font-size:1.1rem">${item.en}</div>
                                <div style="opacity:0.8; font-size: 0.95rem;">${item.ar}</div>
                            </div>
                        </div>
                        <div class="audio-controls">
                            <button class="btn-audio" onclick="speak('${item.en}', 0.9)"><i class="fas fa-volume-up"></i></button>
                            <button class="btn-audio slow" onclick="speak('${item.en}', 0.6)"><i class="fas fa-snail"></i></button>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = content;
        }

        function normalizeArabic(text) {
            return text
                .replace(/[أإآا]/g, 'ا')
                .replace(/[ةه]/g, 'ه')
                .replace(/ى/g, 'ي')
                .replace(/ئ/g, 'ي')
                .replace(/ؤ/g, 'و');
        }

        function filterWords() {
            const q = normalizeArabic(document.getElementById('searchInput').value.toLowerCase());
            const filtered = dictionary.filter(i => {
                const enMatch = i.en.toLowerCase().includes(q);
                const arMatch = normalizeArabic(i.ar).includes(q);
                return enMatch || arMatch;
            });
            displayWords(filtered);
        }

        function toggleMenu(e) { 
            e.stopPropagation(); 
            const m = document.getElementById('sideMenu'); 
            m.style.right = m.style.right === '0px' ? '-300px' : '0px'; 
        }
        
        function showAdmin() { document.getElementById('adminPanel').style.display = 'block'; document.getElementById('overlay').style.display = 'block'; }
        function closeAdmin() { document.getElementById('adminPanel').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; }
        
        function loginAdmin() { 
            if(document.getElementById('adminPass').value === ADMIN_PASS) { 
                isAdmin = true; 
                document.getElementById('loginSection').style.display = 'none'; 
                document.getElementById('controlSection').style.display = 'block'; 
                displayWords(dictionary); 
            } else { 
                alert("خطأ!"); 
            } 
        }

        function handleAdminLogin(e) { if(e.key === 'Enter') loginAdmin(); }
        function accessDatabase() { if (prompt("رمز الوصول:") === ADMIN_PASS) showAdmin(); }
        
        function addWord() {
            const en = document.getElementById('newEn').value;
            const ar = document.getElementById('newAr').value;
            if(en && ar) {
                db.ref('words').push({ en, ar, timestamp: Date.now() }).then(() => {
                    document.getElementById('newEn').value = '';
                    document.getElementById('newAr').value = '';
                });
            }
        }

        function deleteWord(id, enText) { 
            if(confirm("هل تريد حذف هذه الجملة/الكلمة؟")) { 
                if(!id.startsWith('loc_')) {
                    db.ref('words/'+id).remove();
                } else {
                    baseWords = baseWords.filter(w => w.id !== id);
                    dictionary = dictionary.filter(w => w.id !== id);
                    displayWords(dictionary);
                }
            } 
        }

        function showSoonAlert() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        displayWords(dictionary);
    </script>
</body>
</html>
